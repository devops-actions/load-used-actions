name: Test container images
on: push

jobs:
  job-with-container:
    runs-on: ubuntu-latest
    container:
      image: node:18-alpine
    services:
      redis:
        image: redis:7
      postgres:
        image: postgres:15
    steps:
      - uses: actions/checkout@v4
      - uses: docker://ghcr.io/some-org/some-tool:latest
      - run: echo "hello"

  simple-container-job:
    runs-on: ubuntu-latest
    container: python:3.12-slim
    steps:
      - uses: actions/checkout@v4
      - run: python --version
