name: Validate action on PR

on:
  push:
    branches:
      - triage-open-issues
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    name: Run unit tests
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  run-local-action:
    runs-on: ubuntu-latest
    name: Run action from branch
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./
        name: Load used actions for current org
        id: load-actions
        with:
          PAT: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate output
        shell: bash
        run: |
          echo "Actions file: ${{ steps.load-actions.outputs.actions-file }}"
          if [ ! -f "${{ steps.load-actions.outputs.actions-file }}" ]; then
            echo "::error::Output file not found"
            exit 1
          fi
          count=$(jq '. | length' "${{ steps.load-actions.outputs.actions-file }}")
          echo "Found ${count} unique actions"
          if [ "${count}" -le 0 ]; then
            echo "::error::No actions found in output"
            exit 1
          fi
          echo "### Action validation passed: ${count} unique actions found" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload result as artefact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: used-actions-${{ github.run_id }}
          path: used-actions.json
