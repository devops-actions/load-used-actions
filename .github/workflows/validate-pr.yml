name: Validate action on PR

on:
  push:
    branches:
      - triage-open-issues
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    name: Run unit tests
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  run-local-action:
    runs-on: ubuntu-latest
    name: Run action from branch
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: ./
        name: Load used actions for current org
        id: load-actions
        with:
          PAT: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate output
        shell: bash
        run: |
          echo "Actions file: ${{ steps.load-actions.outputs.actions-file }}"
          if [ ! -f "${{ steps.load-actions.outputs.actions-file }}" ]; then
            echo "::error::Output file not found"
            exit 1
          fi
          count=$(jq '. | length' "${{ steps.load-actions.outputs.actions-file }}")
          echo "Found ${count} unique actions"
          if [ "${count}" -le 0 ]; then
            echo "::error::No actions found in output"
            exit 1
          fi
          echo "### Action validation passed: ${count} unique actions found" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload result as artefact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: used-actions-${{ github.run_id }}
          path: used-actions.json
