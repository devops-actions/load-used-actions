name: Validate action on PR

on:
  push:
    branches:
      - triage-open-issues
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    name: Run unit tests
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  run-local-action:
    runs-on: ubuntu-latest
    name: Run action from branch
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./
        name: Load used actions for current org
        id: load-actions
        with:
          PAT: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate output
        shell: bash
        run: |
          echo "Actions file: ${{ steps.load-actions.outputs.actions-file }}"
          if [ ! -f "${{ steps.load-actions.outputs.actions-file }}" ]; then
            echo "::error::Output file not found"
            exit 1
          fi
          count=$(jq '. | length' "${{ steps.load-actions.outputs.actions-file }}")
          echo "Found ${count} unique actions"
          if [ "${count}" -le 0 ]; then
            echo "::error::No actions found in output"
            exit 1
          fi
          echo "### Action validation passed: ${count} unique actions found" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload result as artefact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: used-actions-${{ github.run_id }}
          path: used-actions.json
