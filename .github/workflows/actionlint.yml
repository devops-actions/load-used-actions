name: Lint GitHub Actions workflows
on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read
  pull-requests: write

jobs:
  actionlint:
    uses: devops-actions/.github/.github/workflows/actionlint.yml@891fb6d59e53d81ffc7e9367de68d4ef288f2900 # main
    permissions:
      contents: read
      pull-requests: write