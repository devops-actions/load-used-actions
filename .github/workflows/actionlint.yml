name: Lint GitHub Actions workflows
on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read
  pull-requests: write

jobs:
  actionlint:
    uses: devops-actions/.github/.github/workflows/actionlint.yml@74252b0a9809b8ff09ffe9408d5f344651e507ab # main
    permissions:
      contents: read
      pull-requests: write